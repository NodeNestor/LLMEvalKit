name: windows_demo
description: End-to-end demo profile — all runners verified working on Windows.
runners:
  - name: simple-chat
    tasks: []
  - name: lm-eval-harness
    tasks: [gsm8k]
    args:
      limit: 10
      num_fewshot: 0
      batch_size: 4
  - name: inspect-ai
    tasks: [gsm8k, humaneval, mbpp, ifeval]
    args:
      limit: 5
      max_connections: 4
  - name: bigcodebench
    tasks: [bigcodebench]
    args:
      split: complete
      subset: hard
      id_range: [0, 3]
